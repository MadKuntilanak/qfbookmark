<svg width="680" height="480" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>qfbookmark plugin icon</title>
  <desc>A bold logo for the qfbookmark Neovim plugin, featuring layered bookmark pins over a code editor panel with colored mark indicators</desc>

  <defs>
    <style>
      .lnum { fill: #45475a; font-size: 11px; font-family: monospace }
    </style>
  </defs>

  <!-- Editor panel background -->
  <rect x="60" y="40" width="420" height="380" rx="14" fill="#13131f"/>
  <rect x="60" y="40" width="420" height="36" rx="14" fill="#1a1a2e"/>
  <rect x="60" y="62" width="420" height="14" fill="#1a1a2e"/>

  <!-- Tab bar dots -->
  <circle cx="84" cy="58" r="5" fill="#f38ba8" opacity="0.7"/>
  <circle cx="100" cy="58" r="5" fill="#f9e2af" opacity="0.7"/>
  <circle cx="116" cy="58" r="5" fill="#a6e3a1" opacity="0.7"/>

  <!-- Tab title -->
  <text x="340" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c7086">qf.lua</text>

  <!-- Line numbers column -->
  <rect x="60" y="76" width="36" height="344" fill="#0f0f1a"/>

  <!-- Line 1 -->
  <text x="74" y="102" class="lnum">1</text>
  <text x="108" y="102" font-family="monospace" font-size="12" fill="#cba6f7">local </text>
  <text x="148" y="102" font-family="monospace" font-size="12" fill="#cba6f7">function </text>
  <text x="209" y="102" font-family="monospace" font-size="12" fill="#89b4fa">add_sign</text>
  <text x="261" y="102" font-family="monospace" font-size="12" fill="#cdd6f4">(mode)</text>

  <!-- Line 2 highlight (MARK) -->
  <rect x="96" y="109" width="384" height="18" fill="#1e2535"/>
  <text x="74" y="122" class="lnum">2</text>
  <text x="108" y="122" font-family="monospace" font-size="12" fill="#cba6f7">  local </text>
  <text x="150" y="122" font-family="monospace" font-size="12" fill="#cdd6f4">bufnr = vim.api.</text>
  <text x="284" y="122" font-family="monospace" font-size="12" fill="#89b4fa">nvim_get_current_buf</text>
  <text x="420" y="122" font-family="monospace" font-size="12" fill="#cdd6f4">()</text>

  <!-- Line 3 highlight (FIX) -->
  <rect x="96" y="127" width="384" height="18" fill="#2a1a1a"/>
  <text x="74" y="141" class="lnum">3</text>
  <text x="108" y="141" font-family="monospace" font-size="12" fill="#cba6f7">  if </text>
  <text x="132" y="141" font-family="monospace" font-size="12" fill="#cba6f7">not </text>
  <text x="159" y="141" font-family="monospace" font-size="12" fill="#89b4fa">exclude_buf</text>
  <text x="233" y="141" font-family="monospace" font-size="12" fill="#cdd6f4">(bufnr) </text>
  <text x="288" y="141" font-family="monospace" font-size="12" fill="#cba6f7">then</text>

  <!-- Line 4 -->
  <text x="74" y="161" class="lnum">4</text>
  <text x="108" y="161" font-family="monospace" font-size="12" fill="#cdd6f4">    QfbookmarkUtils.</text>
  <text x="234" y="161" font-family="monospace" font-size="12" fill="#89b4fa">warn</text>
  <text x="261" y="161" font-family="monospace" font-size="12" fill="#a6e3a1"> "excluded"</text>

  <!-- Line 5 -->
  <text x="74" y="181" class="lnum">5</text>
  <text x="108" y="181" font-family="monospace" font-size="12" fill="#cba6f7">    return</text>

  <!-- Line 6 -->
  <text x="74" y="201" class="lnum">6</text>
  <text x="108" y="201" font-family="monospace" font-size="12" fill="#cba6f7">  end</text>

  <!-- Line 7 highlight (DEBUG) -->
  <rect x="96" y="207" width="384" height="18" fill="#2a2010"/>
  <text x="74" y="221" class="lnum">7</text>
  <text x="108" y="221" font-family="monospace" font-size="12" fill="#cba6f7">  local </text>
  <text x="150" y="221" font-family="monospace" font-size="12" fill="#cdd6f4">_, has_note = Bookmark.</text>
  <text x="310" y="221" font-family="monospace" font-size="12" fill="#89b4fa">has_mark_data</text>
  <text x="416" y="221" font-family="monospace" font-size="12" fill="#cdd6f4">(…)</text>

  <!-- Line 8 -->
  <text x="74" y="241" class="lnum">8</text>
  <text x="108" y="241" font-family="monospace" font-size="12" fill="#cba6f7">  if </text>
  <text x="130" y="241" font-family="monospace" font-size="12" fill="#cdd6f4">has_note </text>
  <text x="192" y="241" font-family="monospace" font-size="12" fill="#cba6f7">then</text>

  <!-- Line 9 highlight (NOTE) -->
  <rect x="96" y="247" width="384" height="18" fill="#1a2a1e"/>
  <text x="74" y="261" class="lnum">9</text>
  <text x="108" y="261" font-family="monospace" font-size="12" fill="#cdd6f4">    is_open_window = </text>
  <text x="264" y="261" font-family="monospace" font-size="12" fill="#cba6f7">true</text>

  <!-- Line 10 -->
  <text x="74" y="281" class="lnum">10</text>
  <text x="108" y="281" font-family="monospace" font-size="12" fill="#cba6f7">  end</text>

  <!-- Line 11 -->
  <text x="74" y="301" class="lnum">11</text>
  <text x="108" y="301" font-family="monospace" font-size="12" fill="#89b4fa">  register_mark</text>
  <text x="215" y="301" font-family="monospace" font-size="12" fill="#cdd6f4">(mark_tbl, mode, spec)</text>

  <!-- Line 12 -->
  <text x="74" y="321" class="lnum">12</text>
  <text x="108" y="321" font-family="monospace" font-size="12" fill="#cba6f7">end</text>

  <!-- dim lines -->
  <text x="74" y="341" class="lnum">13</text>
  <line x1="108" y1="337" x2="260" y2="337" stroke="#3d3d5e" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <text x="74" y="361" class="lnum">14</text>
  <line x1="108" y1="357" x2="200" y2="357" stroke="#3d3d5e" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <text x="74" y="381" class="lnum">15</text>
  <line x1="108" y1="377" x2="310" y2="377" stroke="#3d3d5e" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>
  <text x="74" y="401" class="lnum">16</text>
  <line x1="108" y1="397" x2="240" y2="397" stroke="#3d3d5e" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.1"/>

  <!-- Sign column marks -->
  <rect x="92" y="112" width="4" height="14" rx="2" fill="#89b4fa"/>
  <rect x="92" y="130" width="4" height="14" rx="2" fill="#f38ba8"/>
  <rect x="92" y="210" width="4" height="14" rx="2" fill="#fab387"/>
  <rect x="92" y="249" width="4" height="14" rx="2" fill="#a6e3a1"/>

  <!-- MARK pin (blue) -->
  <g transform="translate(430, 55)">
    <ellipse cx="0" cy="3" rx="22" ry="6" fill="rgba(0,0,0,0.3)"/>
    <path d="M0,-38 C-16,-38 -26,-26 -26,-14 C-26,4 0,26 0,26 C0,26 26,4 26,-14 C26,-26 16,-38 0,-38 Z" fill="#89b4fa"/>
    <circle cx="0" cy="-14" r="9" fill="#1e2d3d"/>
    <text x="0" y="-10" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#89b4fa">M</text>
  </g>

  <!-- FIX pin (red) -->
  <g transform="translate(462, 100)">
    <ellipse cx="0" cy="3" rx="20" ry="5" fill="rgba(0,0,0,0.25)"/>
    <path d="M0,-32 C-13,-32 -21,-22 -21,-12 C-21,3 0,22 0,22 C0,22 21,3 21,-12 C21,-22 13,-32 0,-32 Z" fill="#f38ba8"/>
    <circle cx="0" cy="-12" r="7" fill="#3d1e1e"/>
    <text x="0" y="-8" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#f38ba8">F</text>
  </g>

  <!-- DEBUG pin (orange) -->
  <g transform="translate(500, 150)">
    <ellipse cx="0" cy="2" rx="17" ry="4" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,-26 C-11,-26 -18,-18 -18,-10 C-18,2 0,18 0,18 C0,18 18,2 18,-10 C18,-18 11,-26 0,-26 Z" fill="#fab387"/>
    <circle cx="0" cy="-10" r="6" fill="#3d2e1e"/>
    <text x="0" y="-6" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#fab387">D</text>
  </g>

  <!-- NOTE pin (green) -->
  <g transform="translate(490, 220)">
    <ellipse cx="0" cy="2" rx="18" ry="5" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,-28 C-12,-28 -19,-19 -19,-11 C-19,1 0,19 0,19 C0,19 19,1 19,-11 C19,-19 12,-28 0,-28 Z" fill="#a6e3a1"/>
    <circle cx="0" cy="-11" r="7" fill="#1e3d2a"/>
    <text x="0" y="-7" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#a6e3a1">N</text>
  </g>

  <!-- Plugin name -->
  <text x="340" y="446" text-anchor="middle" font-family="monospace" font-size="26" font-weight="500" fill="#cdd6f4" letter-spacing="2">qfbookmark</text>
  <text x="340" y="468" text-anchor="middle" font-family="monospace" font-size="11" fill="#585b70" letter-spacing="1">neovim plugin</text>
</svg>
